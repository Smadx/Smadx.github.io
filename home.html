<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>你的名字</h1>
        <p>这里是你的个人简介。</p>
    </header>
    <aside>
        <img src="path/to/your/photo.jpg" alt="头像" class="profile-photo">
        <nav>
            <ul>
                <li><a href="#education">教育背景</a></li>
                <li><a href="#research">科研经历</a></li>
                <li><a href="#projects">项目介绍</a></li>
                <li><a href="#contact">联系方式</a></li>
            </ul>
        </nav>
    </aside>
    <main>
        <section id="education">
            <h2>教育背景</h2>
            <p>这里是你的教育背景。</p>
        </section>
        <section id="research">
            <h2>科研经历</h2>
            <p>这里是你的科研经历。</p>
        </section>
        <section id="projects">
            <h2>项目介绍</h2>
            <p>这里是你参与的项目介绍。</p>
        </section>
        <section id="contact">
            <h2>联系方式</h2>
            <p>这里是你的联系方式。</p>
        </section>
    </main>
</body>
</html>
